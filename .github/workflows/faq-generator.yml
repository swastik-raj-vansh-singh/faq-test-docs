name: FAQ Generator

on:
  push:
    branches: [main]
    paths:
      - 'pages/docs/**/*.mdx'

jobs:
  generate-faqs:
    runs-on: ubuntu-latest
    # Skip when a FAQ PR is merged (prevents infinite loop).
    # Catches: squash/rebase merges ("docs(faq):") and merge-commit merges ("faq/" branch name).
    if: >-
      ${{
        !contains(github.event.head_commit.message || '', 'docs(faq):')
        && !contains(github.event.head_commit.message || '', 'faq/')
      }}
    steps:
      - name: Send Changed Docs to Lamatic FAQ Flow
        uses: Lamatic/Index-to-lamatic@v1.6
        with:
          webhook_url: ${{ secrets.FAQ_WEBHOOK_URL }}
          webhook_key: ${{ secrets.FAQ_WEBHOOK_KEY }}
          github_ref: ${{ github.ref }}
          file_type: "mdx"
          mode: "incremental"
          verbose: "true"
