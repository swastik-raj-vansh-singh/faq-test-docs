name: FAQ Generator (Bot PR)

on:
  push:
    branches: [main]
    paths:
      - 'pages/docs/**/*.mdx'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-faqs:
    runs-on: ubuntu-latest
    # head_commit can be null on some pushes; then we still run (do not skip).
    if: ${{ github.event.head_commit == null || !contains(github.event.head_commit.message, 'docs(faq):') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed MDX files
        id: changed
        run: |
          files=$(git diff --name-only HEAD^ HEAD -- 'pages/docs/' | grep '\.mdx$' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "No MDX files changed."
          else
            echo "Changed files:"
            echo "$files"
          fi

      - name: Generate FAQs and update files
        if: steps.changed.outputs.files != ''
        id: faq
        env:
          FAQ_BOT_WEBHOOK_URL: ${{ secrets.FAQ_BOT_WEBHOOK_URL }}
          FAQ_BOT_WEBHOOK_KEY: ${{ secrets.FAQ_BOT_WEBHOOK_KEY }}
        run: |
          any_updated=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "=========================================="
            echo "Processing: $file"
            echo "=========================================="

            if [ ! -f "$file" ]; then
              echo "SKIP: File does not exist (deleted?): $file"
              continue
            fi

            if grep -qiE '##\s*(FAQ|Frequently Asked Questions)' "$file"; then
              echo "SKIP: FAQ section already exists in $file"
              continue
            fi

            content=$(cat "$file")
            payload=$(jq -n --arg fn "$file" --arg ct "$content" '{filename: $fn, content: $ct}')

            echo "Calling Lamatic FAQ flow..."
            response=$(curl -s --max-time 180 \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $FAQ_BOT_WEBHOOK_KEY" \
              -d "$payload" \
              "$FAQ_BOT_WEBHOOK_URL" || echo '{"status":"curl_error"}')

            echo "Response received. Parsing..."

            status=$(echo "$response" | jq -r '.status // .result.status // "unknown"')
            echo "Flow status: $status"

            if [ "$status" != "success" ]; then
              reason=$(echo "$response" | jq -r '.reason // .result.reason // "unknown"')
              echo "SKIP: Flow returned status=$status reason=$reason for $file"
              continue
            fi

            faqs_json=$(echo "$response" | jq -c '.faqs // .result.faqs // []')
            faq_count=$(echo "$faqs_json" | jq 'length')
            title=$(echo "$response" | jq -r '.title // .result.title // "Unknown"')

            if [ "$faq_count" -lt 1 ]; then
              echo "SKIP: No FAQs returned for $file"
              continue
            fi

            echo "Got $faq_count FAQs for '$title'. Building FAQ section..."

            faq_section=$(python3 << 'PYEOF'
          import json, sys

          faqs_raw = sys.stdin.read()
          faqs = json.loads(faqs_raw)

          lines = []
          lines.append("")
          lines.append('import { FAQAccordion } from "@/components/FAQAccordion"')
          lines.append("")
          lines.append("## Frequently Asked Questions")
          lines.append("")
          lines.append("<FAQAccordion items={[")

          items = []
          for faq in faqs:
              q = faq["question"].replace('"', '\\"')
              a = faq["answer"].replace('"', '\\"')
              items.append(f'  {{\n    question: "{q}",\n    answer: "{a}"\n  }}')

          lines.append(",\n".join(items))
          lines.append("]} />")
          lines.append("")
          print("\n".join(lines))
          PYEOF
            <<< "$faqs_json")

            printf '%s' "$content" > "$file"
            printf '\n%s' "$faq_section" >> "$file"

            echo "Updated $file with $faq_count FAQs."
            any_updated=true

          done <<< "${{ steps.changed.outputs.files }}"

          echo "any_updated=$any_updated" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.faq.outputs.any_updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(faq): auto-generate FAQs"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          branch: faq/auto-generate-${{ github.run_id }}
          delete-branch: true
          title: "docs(faq): Add auto-generated FAQs"
          body: |
            ## Auto-generated FAQs

            This PR was automatically generated by the Lamatic FAQ Flow.

            ### What changed
            - FAQ sections were appended to the bottom of updated `.mdx` documentation files
            - Each FAQ section contains 7 SEO-optimized question-answer pairs

            ### How to review
            1. Check the file diff to see the generated questions and answers
            2. Edit any FAQ content if needed
            3. Merge to publish

            ---
            _Generated by GitHub Actions using `GITHUB_TOKEN`. PR author: `github-actions[bot]`._
          labels: documentation,auto-generated
